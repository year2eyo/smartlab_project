serial_number: j100-0000
version: 0

system:
  username: yeari
  hosts:
    - hostname: cpr-j100-0000
      ip: 192.168.131.1
  ros2:
    namespace: j100_0000
    domain_id: 0
    middleware:
      implementation: rmw_fastrtps_cpp
    workspaces:
      - /home/yeari/jackal_ws/install/setup.bash

platform:
  controller: ps4
  battery:
    model: HE2613
    configuration: S1P1

  # ⚠️ J100에는 bumper 없음 — 제거됨
  attachments:
    - name: front_fender
      type: j100.fender
      model: sensor              # default → sensor (마운트 포인트 사용 가능)
      parent: base_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true

    - name: rear_fender
      type: j100.fender
      model: sensor
      parent: base_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 3.1415]   # 뒤쪽이라 180° 회전
      enabled: true

    - name: ark_enclosure
      type: j100.top_plate
      model: ark_enclosure
      parent: default_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true

  extras:
    urdf:
      package: smartlab_project_description
      path: urdf/smartlab_project_description.urdf.xacro
    launch:
      package: smartlab_project_bringup
      path: launch/smartlab_project_bringup.launch.py

links:
  box: []
  cylinder: []
  frame: []
  mesh: []
  sphere: []

mounts:
  bracket:
    - parent: top_plate_link
      xyz: [0.0, 0.0, 0.05]
      rpy: [0.0, 0.0, 0.0]
      model: horizontal
  fath_pivot:
    - parent: top_plate_link
      xyz: [0.12, 0.0, 0.05]
      rpy: [0.0, 0.0, 0.0]
      angle: 0.0
  riser: []
  sick: []
  post: []
  disk: []

sensors:
  # 📷 Intel RealSense D435 (fath_pivot에 부착)
  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: fath_pivot_0_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435
          serial_no: '0'
          enable_color: true
          rgb_camera.profile: 640,480,30
          enable_depth: true
          depth_module.profile: 640,480,30
          pointcloud.enable: true

  gps: []
  imu: []

  # 📡 Hokuyo UST 2D LiDAR (bracket에 부착)
  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: bracket_0_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        urg_node:
          laser_frame_id: lidar2d_0_laser
          ip_address: 192.168.131.20
          ip_port: 10940
          angle_min: -2.356
          angle_max: 2.356

  lidar3d: []
